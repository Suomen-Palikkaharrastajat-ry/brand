# Deploy elm-pages site to GitHub Pages
name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: devenv shell bash -- -e {0}
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31

      - uses: cachix/cachix-action@v16
        with:
          name: devenv

      - name: Install devenv.sh
        shell: bash
        run: nix profile add nixpkgs#devenv

      - name: Build devenv shell
        run: echo "devenv shell ready"

      - name: Run Haskell pipeline and copy assets
        run: make assets

      - name: Install npm dependencies
        run: npm install

      - name: Build elm-pages site
        run: npx elm-pages build

      - name: Setup Pages
        uses: actions/configure-pages@v5
        # configure-pages has no run commands, shell override doesn't apply

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
